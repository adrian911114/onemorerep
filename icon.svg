<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="#0f1117"/>

  <!-- 바벨 가로대 -->
  <rect x="96" y="240" width="320" height="32" rx="16" fill="#3a7bd5"/>

  <!-- 왼쪽 원판 큰 -->
  <rect x="72" y="168" width="44" height="176" rx="14" fill="#5b9af8"/>
  <!-- 왼쪽 원판 작은 -->
  <rect x="116" y="192" width="28" height="128" rx="10" fill="#5b9af8"/>

  <!-- 오른쪽 원판 큰 -->
  <rect x="396" y="168" width="44" height="176" rx="14" fill="#5b9af8"/>
  <!-- 오른쪽 원판 작은 -->
  <rect x="368" y="192" width="28" height="128" rx="10" fill="#5b9af8"/>

  <!-- 중앙 손잡이 강조 -->
